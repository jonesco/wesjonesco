      <h1>Wes Jones</h1>
      <h2>Lead Product Designer</h2>

      <p>I am a Lead Product Designer with more than 20 years of experience leading and mentoring digital product teams across a wide range of industries. Lately, I've been focused on designing agentic systems and purpose-built interaction patterns that make it easier for people to work with AI and solve complex problems. My job is to empathize with the user, understand the challenges, concept solutions, build prototypes, test, iterate, and deliver.</p>

      <hr />

      <h2>Selected Case Studies</h2>

      <h3><a href="/fund-manager">Fund Manager Workspace</a></h3>
      <p>As the sole product designer, I modernized and united a disparate group of applications into a unified platform for one of the world's top investment banks managing over $11 trillion in assets. I enhanced efficiency in cash allocation, asset rebalancing, and trade recommendations — designing over a dozen robust features that reduced clicks, minimized repetitive actions, and provided dynamic feedback.</p>

      <h3><a href="/ns_pattern_library">Netspend Pattern Library</a></h3>
      <p>I led the design team in creating a comprehensive Figma-based pattern library for Netspend, a fintech company serving millions of customers. Built using Atomic Design Methodology, the library standardized UI components across the organization and included a Sticker Sheet component library that powered all design work. First comprehensive pattern library in Netspend's history.</p>

      <h3><a href="/custom_card_creator">Custom Debit Card Creator</a></h3>
      <p>Conceived and designed a feature that lets Netspend customers personalize their debit card art using emoji. The pinch/zoom/rotate interface drives engagement and retention — research showed customers active for two months stay for at least a year. Used public domain emoji to eliminate asset costs entirely.</p>

      <h3><a href="/wayblazer">Wayblazer Search Platform</a></h3>
      <p>Working as a consultant, I designed a smart AI-powered travel search experience using IBM Watson APIs that predicts trip type (family vs. business) and suggests relevant activities. Designed for seamless white-label integration into third-party sites with full responsive support across all devices.</p>

      <h3><a href="/magicstaff">MagicStaff POC</a></h3>
      <p>Built in one month as a proof of concept, MagicStaff is a global developer staffing solution powered by Google OR-Tools optimization. I interviewed users, designed pixel-perfect prototypes, and conducted user testing. The platform generates weighted staffing recommendations with skill trees, upskilling tracking, and a company-wide calendar impact view.</p>

      <h3><a href="/cpay">CPay Sales Assistant Workshop</a></h3>
      <p>Hosted and led a 4-day Google Ventures Design Sprint with Central Payment Corporation's sales team. Facilitated sketching sessions, storyboarding, and delivered a polished high-fidelity clickable prototype built with Ionic Platform — completed within four days and demoed before the team flew home.</p>

      <h3><a href="/spotme">SpotMe Lending Concept</a></h3>
      <p>Partnered with IDEO to research and design a peer-to-peer lending concept for Netspend. Ran a 3-day design sprint and tested the concept with real users using an App Store-style explainer prototype. User testing revealed the concept wasn't viable, saving the company thousands in development costs. A well-executed, data-driven decision not to build.</p>

      <h3><a href="/wellsmith">Wellsmith Web Portal & Mobile App</a></h3>
      <p>Designed a healthcare compliance ecosystem tracking patients' medication, activity, nutrition, and vitals. Includes a physician portal for clinicians to monitor large patient populations in real time, plus a patient mobile app with individualized reminders and care plan baselines.</p>

      <hr />

        <li><strong>Visionary</strong> — Uses curiosity to understand the full problem, prioritizes the right issues, and creates durable solutions.</li>
        <li><strong>Creative</strong> — Balances imagination and logic to create designs that delight and perform.</li>
        <li><strong>Organizer</strong> — Defines design patterns and documents components for consistency in how products look and function.</li>
        <li><strong>Builder</strong> — Creates pixel-perfect designs and prototypes that surface unknown problems quickly.</li>
        <li><strong>Mentor</strong> — Guides teams to challenge assumptions and develop their skills.</li>
      </ul>
